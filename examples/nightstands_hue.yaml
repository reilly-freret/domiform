# yaml-language-server: $schema=../schema/domiform.schema.json
system:
  timezone: America/New_York
  latitude: 40.71
  longitude: -74.01

adapters:
  z2m:
    type: zigbee2mqtt
    url: mqtt://burrow.kite-lydian.ts.net:1883
    base_topic: zigbee2mqtt

devices:
  reilly_dimmer:
    adapter: z2m
    address: hue_battery_dimmer_a
    events:
      power: on_press_release
      up: up_press_release
      down: down_press_release
      off: off_press_release

  kennedy_dimmer:
    adapter: z2m
    address: hue_battery_dimmer_b
    events:
      power: on_press_release
      up: up_press_release
      down: down_press_release
      off: off_press_release

  reilly_nightstand:
    adapter: z2m
    address: 3r_rgb_a
    # `color` and `color_temperature` are independent — an RGB bulb that also
    # does tunable white declares both.
    capabilities: [switch, brightness, color, color_temperature]

  kennedy_nightstand:
    adapter: z2m
    address: 3r_rgb_b
    capabilities: [switch, brightness, color, color_temperature]

  bedroom_wall_switch:
    adapter: z2m
    address: "sonoff_mains_decora_a"
    events:
      middle: toggle_l2

rules:
  kennedy_toggle: 
    when:
      event: kennedy_dimmer.power
    then: 
      - toggle: kennedy_nightstand

  kennedy_dim:
    when: 
      event: kennedy_dimmer.down
    then:
      - decrease_brightness: { device: kennedy_nightstand, by: 20 }

  kennedy_brighten:
    when: 
      event: kennedy_dimmer.up
    then:
      - increase_brightness: { device: kennedy_nightstand, by: 20 }
  
  kennedy_both_off:
    when:
      event: kennedy_dimmer.off
    if:
      switch_is: 
        device: kennedy_nightstand
        is_on: true
    then:
      - turn_off: kennedy_nightstand
      - turn_off: reilly_nightstand

  kennedy_both_on:
    when:
      event: kennedy_dimmer.off
    if:
      switch_is: 
        device: kennedy_nightstand
        is_on: false
    then:
      - set_brightness: { device: kennedy_nightstand, value: 100 }
      - set_brightness: { device: reilly_nightstand, value: 100 }
      # Warm white on wake-up; ~2700 K reads as cozy. `transition` fades it in.
      - set_color_temperature: { device: kennedy_nightstand, kelvin: 2700, transition: 1s }
      - set_color_temperature: { device: reilly_nightstand, kelvin: 2700, transition: 1s }

  reilly_toggle:
    when:
      event: reilly_dimmer.power
    then: 
      - toggle: reilly_nightstand

  reilly_dim:
    when: 
      event: reilly_dimmer.down
    then:
      - decrease_brightness: { device: reilly_nightstand, by: 20 }

  reilly_brighten:
    when: 
      event: reilly_dimmer.up
    then:
      - increase_brightness: { device: reilly_nightstand, by: 20 }
  
  reilly_both_off:
    when:
      event: reilly_dimmer.off
    if:
      switch_is: 
        device: reilly_nightstand
        is_on: true
    then:
      - turn_off: kennedy_nightstand
      - turn_off: reilly_nightstand

  reilly_both_on:
    when:
      event: reilly_dimmer.off
    if:
      switch_is:
        device: reilly_nightstand
        is_on: false
    then:
      - set_brightness: { device: kennedy_nightstand, value: 100 }
      - set_brightness: { device: reilly_nightstand, value: 100 }
      # Wall switch brings the room up in a warm amber. `color` accepts either a
      # `#RRGGBB` hex string or an `{ r, g, b }` object (0–255 each).
      - set_color: { device: kennedy_nightstand, color: "#ff9e3d", transition: 1s }
      - set_color: { device: reilly_nightstand, color: { r: 255, g: 158, b: 61 }, transition: 1s }

  wall_switch_off:
    when:
      event: bedroom_wall_switch.middle
    if:
      switch_is: 
        device: kennedy_nightstand
        is_on: true
    then:
      - turn_off: kennedy_nightstand
      - turn_off: reilly_nightstand

  wall_switch_on:
    when:
      event: bedroom_wall_switch.middle
    if:
      switch_is: 
        device: kennedy_nightstand
        is_on: false
    then:
      - set_brightness: { device: kennedy_nightstand, value: 100 }
      - set_brightness: { device: reilly_nightstand, value: 100 }