# yaml-language-server: $schema=../schema/domiform.schema.json
system:
  timezone: America/New_York
  latitude: 40.71
  longitude: -74.01

adapters:
  z2m:
    type: zigbee2mqtt
    url: mqtt://burrow.kite-lydian.ts.net:1883
    base_topic: zigbee2mqtt

devices:
  moes_button_grid:
    adapter: z2m
    address: moes_battery_grid_a
    events:
      bottom_right_single: 4_single
      bottom_right_double: 4_double

  nightstands_left:
    adapter: z2m
    address: 3r_rgb_a
    capabilities: [switch, brightness]

  nightstands_right:
    adapter: z2m
    address: 3r_rgb_b
    capabilities: [switch, brightness]

rules:
  nightstands_on:
    when: { event: moes_button_grid.bottom_right_single }
    if: { switch: { device: nightstands_left, is_on: false } }
    then:
      - activate_scene: nightstands_on

  nightstands_off:
    when: { event: moes_button_grid.bottom_right_single }
    if: { switch: { device: nightstands_left, is_on: true } }
    then:
      - activate_scene: nightstands_off

scenes:
  nightstands_on:
    - turn_on: nightstands_left
    - set_brightness: { device: nightstands_left, value: 100 }
    - turn_on: nightstands_right
    - set_brightness: { device: nightstands_right, value: 100 }

  nightstands_off:
    - turn_off: nightstands_left
    - turn_off: nightstands_right