# yaml-language-server: $schema=../schema/domiform.schema.json
#
# Example Domiform config: a dark-aware hallway motion light over zigbee2mqtt.
#
# Compile + run against a real broker (the zigbee2mqtt transport is always built):
#     cargo run -- -c examples/hallway.yaml

system:
  timezone: America/New_York
  # Drive the clock/sun adapter: real time-of-day in this tz, and real
  # sunrise/sunset from these coordinates (so `sun_up` below is accurate).
  latitude: 40.71
  longitude: -74.01

adapters:
  home:
    type: zigbee2mqtt
    url: mqtt://burrow.kite-lydian.ts.net:1883
    base_topic: zigbee2mqtt

devices:
  # `address` is the zigbee2mqtt friendly_name (defaults to the IEEE address).
  hallway_motion:
    adapter: home
    address: "0x00158d0001abc001"
    capabilities: [occupancy, battery]

  hallway_light:
    adapter: home
    address: "0x00158d0001def002"
    capabilities: [switch, brightness]

rules:
  # Motion while it's dark turns the light on.
  hallway_on:
    when: { changed: { device: hallway_motion, capability: occupancy, to: true } }
    if: { sun_up: false }
    then:
      - turn_on: hallway_light

  # Motion clear *for* 5 minutes turns the light off. The `for:` qualifier makes
  # the engine arm a 5-minute timer on the clear edge and auto-cancel it if
  # motion resumes — the whole timer/cancel dance in one declaration, with the
  # forgot-to-cancel footgun designed out.
  hallway_off:
    when: { changed: { device: hallway_motion, capability: occupancy, to: false } }
    for: 5m
    then:
      - turn_off: hallway_light
